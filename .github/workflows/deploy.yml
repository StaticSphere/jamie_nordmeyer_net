name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 22. (optional)
          package-manager: pnpm@10.33.0+sha512.10568bb4a6afb58c9eb3630da90cc9516417abebd3fabbe6739f0ae795728da1491e9db5a544c76ad8eb7570f5c4bb3d6c637b2cb41bfdcdb47fa823c8649319 # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)
          build-cmd: pnpm run build # The command to run to build your site. Runs the package build script/task by default. (optional)
          # env:
        # PUBLIC_POKEAPI: 'https://pokeapi.co/api/v2' # Use single quotation marks for the variable value. (optional)
      - name: Validate generated crawl files
        run: |
          test -f dist/robots.txt || (echo "Missing dist/robots.txt" && exit 1)
          test -f dist/sitemap-index.xml || (echo "Missing dist/sitemap-index.xml" && exit 1)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify-canonical-host:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify apex and www redirect behavior
        run: |
          set -euo pipefail

          apex_status=$(curl -sS -o /dev/null -w "%{http_code}" --retry 6 --retry-delay 5 --retry-connrefused https://jamienordmeyer.net)
          if [ "$apex_status" != "200" ]; then
            echo "Expected apex to return 200, got $apex_status"
            exit 1
          fi

          www_location=$(curl -sSI --retry 6 --retry-delay 5 --retry-connrefused https://www.jamienordmeyer.net | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2; exit}' | tr -d '\r')
          if [ -z "$www_location" ]; then
            echo "Expected www host to redirect to apex, but no Location header was returned"
            exit 1
          fi

          case "$www_location" in
            https://jamienordmeyer.net|https://jamienordmeyer.net/*)
              echo "Canonical redirect check passed: $www_location"
              ;;
            *)
              echo "Expected www to redirect to apex, got: $www_location"
              exit 1
              ;;
          esac
